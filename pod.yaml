apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    app: nginx-pod
spec:
  containers:
  - name: nginx-container
    image: nginx:latest
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    ports:
      - containerPort: 80

    volumeMounts:
      - name: nginx-storage
        mountPath: /data

  volumes:
    - name: nginx-storage
      persistentVolumeClaim:
        claimName: nginx-pvc
